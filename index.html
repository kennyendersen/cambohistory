<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>CamboHistory</title>
</head>
<body>
    <nav class="menu-lateral">
    <div class="expandir">
        <i class="bi bi-list"></i>
    </div>

    <ul>
        <li class="item-menu">
            <a href="#">
                <span class="icon"><i class="bi bi-info-lg"></i></span>

        </li>
        <li class="item-menu">
            <a href="#">
                <span class="icon"><i class="bi bi-list-nested"></i></span>

            </a>
        </li>
        <li class="item-menu">
            <a href="#">
                <span class="icon"><i class="bi bi-person-lines-fill"></i></span>

        <li class="item-menu">
            <a href="#">
                <span class="icon"><i class="bi bi-share-fill"></i></span>
                <span class="txt-link">Compartilhar</span>
            </a>
        </li>
        <li class="item-menu">
            <a href="#">
                <span class="icon"><i class="bi bi-pencil-fill"></i></span>
                <span class="txt-link">Sugestões</span>
            </a>
        </li>
    </ul>
</nav>

    <div class="search-box">
        <div class="lupa">
            <i class="bi bi-search"></i>
        </div>
        <div class="input-buscar">
            <input type="text" name="" id="" placeholder="Pesquise por uma empresa"/>
        </div>
        
    </div>
    <script src="assets/js/script.js"></script>

</html>
